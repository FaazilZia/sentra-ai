services:
  # Backend Web Service
  - type: web
    name: sentra-ai-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sentra-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sentra-redis
          property: connectionString
      - key: APP_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.8

  # Frontend Static Site
  - type: static
    name: sentra-ai-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: sentra-ai-backend
          property: host
      - key: VITE_BYPASS_AUTH
        value: "true"

  # Managed Redis (Key Value)
  - type: keyvalue
    name: sentra-redis
    plan: free
    ipAllowList: [] # Only allow internal traffic

# Managed Database
databases:
  - name: sentra-db
    plan: free
    databaseName: sentra
    user: sentra_user
