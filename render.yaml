services:
  - type: web
    name: sentra-backend-node
    env: node
    plan: free
    rootDir: backend-node
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build && npx ts-node prisma/seed.ts
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://sentra-ai-tau.vercel.app,https://sentra-ai.vercel.app,http://localhost:5173
      - key: PORT
        value: 10000
