services:
  - type: web
    name: sentra-backend-node
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://sentra-ai-88f7.vercel.app,https://sentra-ai-tau.vercel.app,https://sentra-ai.vercel.app,http://localhost:5173
      - key: PORT
        value: 10000
