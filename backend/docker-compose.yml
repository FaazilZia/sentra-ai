version: "3.9"

services:
  api:
    build:
      context: .
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
    command: celery -A app.workers.celery_app worker -l info
    env_file:
      - .env.example
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: nemoguard
      POSTGRES_USER: nemoguard
      POSTGRES_PASSWORD: nemoguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
