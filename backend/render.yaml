services:
  - type: web
    name: sentra-backend-node
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL # Supabase Transaction Pooler URL (Port 6543)
        sync: false
      - key: DIRECT_URL   # Supabase Direct Connection URL (Port 5432)
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://sentra-ai-tau.vercel.app,https://sentra-ai.vercel.app,http://localhost:5173
      - key: PORT
        value: 10000
